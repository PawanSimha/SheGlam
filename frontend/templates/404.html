{% extends 'base.html' %}

{% block title %}Page Not Found - SheGlam{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-purple-50 px-6">
    <div class="text-center">
        <div class="relative w-64 h-64 mx-auto mb-8">
            <div class="absolute inset-0 bg-purple-200 rounded-full opacity-20 animate-pulse"></div>
            <div class="absolute inset-4 bg-pink-200 rounded-full opacity-20 animate-pulse animation-delay-500"></div>
            <div class="flex items-center justify-center h-full text-9xl">
                🤔
            </div>
        </div>
        <h1
            class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 mb-4">
            404</h1>
        <h2 class="text-3xl font-bold text-gray-800 mb-4">Page Not Found</h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto text-lg">
            Oops! The page you are looking for might have been removed, had its name changed, or is temporarily
            unavailable.
        </p>
        <a href="/" class="btn btn-primary px-8 py-3 text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1">
            <i class="fas fa-home mr-2"></i> Back to Homepage
        </a>
    </div>
</div>
{% endblock %}
