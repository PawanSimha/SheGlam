<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SheGlam{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/forms.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header">
    <a href="/" class="brand">SheGlam</a>
    <nav id="universal-nav">
      <!-- Navigation links populated by auth.js -->
    </nav>
  </header>

  {% block content %}{% endblock %}

  <footer style="text-align: center; padding: 2rem 0; color: #888; font-size: 0.9rem; margin-top: 2rem; border-top: 1px solid #eee;">
    <p>&copy; 2025 SheGlam. All rights reserved.</p>
  </footer>

  <script src="/static/js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => { if (typeof updateNavigation === 'function') updateNavigation(); });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
