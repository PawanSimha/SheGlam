{% extends 'base.html' %}

{% block title %}Admin Dashboard - SheGlam{% endblock %}

{% block content %}
<div class="bg-gray-100 min-h-screen py-10">
  <div class="container mx-auto px-6">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Admin Dashboard</h1>

    <!-- Stats Overview -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="text-gray-500 text-sm font-medium uppercase mb-1">Total Users</div>
        <div class="text-3xl font-bold text-gray-900" id="userCount">-</div>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="text-gray-500 text-sm font-medium uppercase mb-1">Total Artists</div>
        <div class="text-3xl font-bold text-gray-900" id="artistCount">-</div>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <div class="text-gray-500 text-sm font-medium uppercase mb-1">Pending approval</div>
        <div class="text-3xl font-bold text-orange-600" id="pendingCount">-</div>
      </div>
    </div>

    <!-- Pending Artists Section -->
    <div class="bg-white rounded-xl shadow mb-10 overflow-hidden">
      <div class="p-6 border-b border-gray-100 bg-orange-50">
        <h2 class="text-xl font-bold text-orange-900 flex items-center">
          <i class="fas fa-exclamation-circle mr-2"></i> Pending Approvals
        </h2>
      </div>
      <div id="pendingList" class="divide-y divide-gray-100">
        <div class="p-8 text-center text-gray-500">Loading pending artists...</div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- All Artists -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-900">All Artists</h2>
          <button onclick="loadArtists()" class="text-pink-600 hover:text-pink-800 text-sm font-medium">Refresh</button>
        </div>
        <div id="allArtistsList" class="divide-y divide-gray-100 max-h-96 overflow-y-auto">
          <!-- Loaded via JS -->
        </div>
      </div>

      <!-- All Users -->
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
          <h2 class="text-xl font-bold text-gray-900">All Users</h2>
          <button onclick="loadUsers()" class="text-pink-600 hover:text-pink-800 text-sm font-medium">Refresh</button>
        </div>
        <div id="allUsersList" class="divide-y divide-gray-100 max-h-96 overflow-y-auto">
          <!-- Loaded via JS -->
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const token = localStorage.getItem('token');

  async function loadPending() {
    try {
      const res = await fetch('/api/admin/artists/pending', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();

      document.getElementById('pendingCount').textContent = data.length || 0;

      const container = document.getElementById('pendingList');
      if (data.length === 0) {
        container.innerHTML = '<div class="p-8 text-center text-gray-500">No pending approvals.</div>';
        return;
      }

      container.innerHTML = data.map(artist => `
            <div class="p-6 flex flex-col md:flex-row justify-between items-start md:items-center hover:bg-orange-50 transition">
                <div>
                    <h3 class="font-bold text-lg text-gray-900">${artist.name} <span class="text-sm font-normal text-gray-500">(${artist.business_name || 'No Business Name'})</span></h3>
                     <p class="text-sm text-gray-600"><i class="fas fa-map-marker-alt mr-1"></i> ${artist.location} | Exp: ${artist.experience_years} years</p>
                    <div class="mt-2 flex space-x-4 text-xs">
                        ${artist.certificate ? `<a href="/static/uploads/certificates/${artist.certificate}" target="_blank" class="text-blue-600 underline">View Certificate</a>` : ''}
                        ${artist.govt_id_file ? `<a href="/api/admin/artist/${artist._id}/govt-id/${artist.govt_id_file}" target="_blank" class="text-blue-600 underline">View Govt ID</a>` : ''}
                    </div>
                </div>
                <div class="mt-4 md:mt-0 flex space-x-2">
                    <button onclick="approveArtist('${artist._id}')" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 font-medium text-sm">Approve</button>
                    <button onclick="rejectArtist('${artist._id}')" class="bg-red-600 text-white px-4 py-2 rounded shadow hover:bg-red-700 font-medium text-sm">Reject</button>
                </div>
            </div>
        `).join('');
    } catch (e) { console.error(e); }
  }

  async function loadArtists() {
    try {
      const res = await fetch('/api/admin/artists', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      document.getElementById('artistCount').textContent = data.length || 0;

      document.getElementById('allArtistsList').innerHTML = data.map(artist => `
             <div class="p-4 flex justify-between items-center hover:bg-gray-50">
                <div>
                    <div class="font-bold text-gray-800">${artist.business_name || artist.name}</div>
                    <div class="text-xs text-gray-500 capitalize">Status: <span class="${artist.verification_status === 'approved' ? 'text-green-600' : 'text-yellow-600'}">${artist.verification_status}</span> | ${artist.email}</div>
                </div>
                <button onclick="deleteArtist('${artist._id}')" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    } catch (e) { }
  }

  async function loadUsers() {
    try {
      const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      document.getElementById('userCount').textContent = data.length || 0;

      document.getElementById('allUsersList').innerHTML = data.map(user => `
             <div class="p-4 flex justify-between items-center hover:bg-gray-50">
                <div>
                    <div class="font-bold text-gray-800">${user.name}</div>
                    <div class="text-xs text-gray-500">${user.email} | Role: ${user.role}</div>
                </div>
                ${user.role !== 'admin' ? `<button onclick="deleteUser('${user._id}')" class="text-red-500 hover:text-red-700 text-sm"><i class="fas fa-trash"></i></button>` : ''}
            </div>
        `).join('');
    } catch (e) { }
  }

  async function approveArtist(id) {
    if (!confirm('Approve this artist?')) return;
    await fetch(`/api/admin/artist/approve/${id}`, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
    loadPending(); loadArtists();
  }

  async function rejectArtist(id) {
    if (!confirm('Reject this artist?')) return;
    await fetch(`/api/admin/artist/reject/${id}`, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
    loadPending(); loadArtists();
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user permanently?')) return;
    await fetch(`/api/admin/user/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
    loadUsers();
  }

  async function deleteArtist(id) {
    if (!confirm('Delete this artist permanently?')) return;
    await fetch(`/api/admin/artist/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
    loadArtists();
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (!token) window.location.href = '/login';
    loadPending();
    loadArtists();
    loadUsers();
  });
</script>
{% endblock %}
