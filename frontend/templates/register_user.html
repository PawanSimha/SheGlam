{% extends 'base.html' %}

{% block title %}Register User - SheGlam{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl">
    <div class="text-center">
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">Create Account</h2>
      <p class="mt-2 text-sm text-gray-600">
        Join as a User to book artists
      </p>
    </div>

    <form class="mt-8 space-y-4" id="registerUserForm">
      <input type="hidden" name="role" value="user">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input name="name" type="text" required
          class="block w-full px-3 py-3 border border-gray-300 rounded-lg focus:ring-pink-500 focus:border-pink-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
        <input name="email" type="email" required
          class="block w-full px-3 py-3 border border-gray-300 rounded-lg focus:ring-pink-500 focus:border-pink-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <input name="phone" type="text" required
          class="block w-full px-3 py-3 border border-gray-300 rounded-lg focus:ring-pink-500 focus:border-pink-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required
          class="block w-full px-3 py-3 border border-gray-300 rounded-lg focus:ring-pink-500 focus:border-pink-500">
      </div>

      <button type="submit"
        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-pink-600 hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 transition">
        Register
      </button>

      <div id="message" class="text-center text-sm font-medium mt-4 h-6"></div>
    </form>

    <div class="text-center mt-4">
      <a href="/login" class="font-medium text-pink-600 hover:text-pink-500">Already have an account? Log in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('registerUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    const msgDiv = document.getElementById('message');

    msgDiv.textContent = 'Registering...';
    msgDiv.className = 'text-center text-sm font-medium mt-4 h-6 text-gray-500';

    try {
      const res = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();

      if (res.ok) {
        msgDiv.textContent = 'Account created! Redirecting to login...';
        msgDiv.className = 'text-center text-sm font-medium mt-4 h-6 text-green-600';
        setTimeout(() => window.location.href = '/login', 1500);
      } else {
        msgDiv.textContent = result.error || 'Registration failed';
        msgDiv.className = 'text-center text-sm font-medium mt-4 h-6 text-red-600';
      }
    } catch (err) {
      msgDiv.textContent = 'Network error';
      msgDiv.className = 'text-center text-sm font-medium mt-4 h-6 text-red-600';
    }
  });
</script>
{% endblock %}
