{% extends 'base.html' %}

{% block title %}Server Error - SheGlam{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center bg-red-50 px-6">
    <div class="text-center">
        <div class="relative w-64 h-64 mx-auto mb-8">
            <div class="absolute inset-0 bg-red-200 rounded-full opacity-20 animate-pulse"></div>
            <div class="absolute inset-4 bg-orange-200 rounded-full opacity-20 animate-pulse animation-delay-500"></div>
            <div class="flex items-center justify-center h-full text-9xl">
                🔧
            </div>
        </div>
        <h1
            class="text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-600 to-orange-600 mb-4">
            500</h1>
        <h2 class="text-3xl font-bold text-gray-800 mb-4">Internal Server Error</h2>
        <p class="text-gray-600 mb-8 max-w-md mx-auto text-lg">
            We're having some trouble on our end. Please try again later or contact support if the problem persists.
        </p>
        <div class="flex justify-center space-x-4">
            <a href="/"
                class="btn btn-primary px-8 py-3 text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 bg-red-600 border-red-600 hover:bg-red-700">
                <i class="fas fa-home mr-2"></i> Home
            </a>
            <a href="/contact" class="btn btn-secondary px-8 py-3 text-lg">
                Contact Support
            </a>
        </div>
    </div>
</div>
{% endblock %}
