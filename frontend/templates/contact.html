{% extends 'base.html' %}

{% block content %}
<div class="bg-gray-50 min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-3xl font-extrabold text-gray-900 sm:text-4xl">
                Get in Touch
            </h2>
            <p class="mt-4 text-lg text-gray-500">
                Have questions? We'd love to hear from you.
            </p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden md:flex">
            <!-- Contact Info -->
            <div class="bg-purple-600 md:w-1/3 p-8 text-white flex flex-col justify-between">
                <div>
                    <h3 class="text-xl font-bold mb-6">Contact Information</h3>
                    <div class="space-y-4">
                        <div class="flex items-start space-x-3">
                            <i class="fas fa-envelope mt-1"></i>
                            <div>
                                <p class="text-purple-200 text-sm">Email us directly:</p>
                                <a href="mailto:pawansimha.pc@gmail.com"
                                    class="font-medium hover:text-purple-200 transition">pawansimha.pc@gmail.com</a>
                            </div>
                        </div>
                        <div class="flex items-start space-x-3">
                            <i class="fas fa-map-marker-alt mt-1"></i>
                            <div>
                                <p class="text-purple-200 text-sm">Location:</p>
                                <p class="font-medium">Bangalore, India</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <p class="text-purple-200 text-sm mb-4">Follow us:</p>
                    <div class="flex space-x-4">
                        <a href="#"
                            class="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center hover:bg-white hover:text-purple-600 transition"><i
                                class="fab fa-instagram"></i></a>
                        <a href="#"
                            class="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center hover:bg-white hover:text-purple-600 transition"><i
                                class="fab fa-twitter"></i></a>
                        <a href="#"
                            class="w-8 h-8 bg-purple-500 rounded-full flex items-center justify-center hover:bg-white hover:text-purple-600 transition"><i
                                class="fab fa-linkedin-in"></i></a>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="md:w-2/3 p-8">
                <form action="https://formsubmit.co/pawansimha.pc@gmail.com" method="POST" class="space-y-6">
                    <!-- FormSubmit Configuration -->
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="http://localhost:5000/contact?success=true">
                    <input type="hidden" name="_subject" value="New Inquiry from SheGlam Website">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                            <input type="text" name="name" id="name" required
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-purple-500 focus:border-purple-500 sm:text-sm px-4 py-2 border">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                            <input type="email" name="email" id="email" required
                                class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-purple-500 focus:border-purple-500 sm:text-sm px-4 py-2 border">
                        </div>
                    </div>

                    <div>
                        <label for="subject" class="block text-sm font-medium text-gray-700">Subject</label>
                        <select name="subject" id="subject"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-purple-500 focus:border-purple-500 sm:text-sm px-4 py-2 border">
                            <option>General Inquiry</option>
                            <option>Booking Issue</option>
                            <option>Artist Support</option>
                            <option>Feedback</option>
                        </select>
                    </div>

                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
                        <textarea name="message" id="message" rows="4" required
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-purple-500 focus:border-purple-500 sm:text-sm px-4 py-2 border"></textarea>
                    </div>

                    <button type="submit"
                        class="w-full bg-purple-600 text-white font-bold py-3 px-4 rounded-md hover:bg-purple-700 transition transform hover:-translate-y-0.5 shadow-md">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Check for success parameter in URL to show alert
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('success') === 'true') {
        const div = document.createElement('div');
        div.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-4 rounded-lg shadow-xl z-50 animate-bounce';
        div.innerHTML = '<i class="fas fa-check-circle mr-2"></i> Message sent successfully!';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 5000);
        // Clean URL
        window.history.replaceState({}, document.title, window.location.pathname);
    }
</script>
{% endblock %}
